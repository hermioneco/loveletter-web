---
- name: Préparer l'environnement de déploiement
  hosts: servers
  become: yes                  # exécute en sudo



  tasks:
    - name: Installer les dépendances Terraform
      apt:
        name:
          - gnupg
          - software-properties-common
          - curl
        state: present

    - name: Ajouter la clé GPG HashiCorp
      apt_key:
        url: https://apt.releases.hashicorp.com/gpg
        state: present

    - name: Ajouter le dépôt HashiCorp
      apt_repository:
        repo: "deb [arch=amd64] https://apt.releases.hashicorp.com {{ ansible_lsb.codename }} main"
        state: present

    - name: Installer Terraform
      apt:
        name: terraform
        state: present
        update_cache: yes

    - name: Vérifier l'installation de Docker
      command: docker --version
      register: docker_version

    - name: Vérifier l'installation de Terraform
      command: terraform -v
      register: terraform_version

    - name: Afficher les versions installées
      debug:
        msg:
          - "{{ docker_version.stdout }}"
          - "{{ terraform_version.stdout }}"
